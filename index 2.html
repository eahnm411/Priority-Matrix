.wrap{max-width:1100px;margin:0 auto;position:relative}
input,select,textarea,button{
  font-family:inherit;
  border:0.5px solid var(--border-strong);
  border-radius:var(--radius);
  padding:6px 8px;
  background:var(--surface-2);
  color:var(--text-primary);
}
button{cursor:pointer}
body.dark input[type="date"]::-webkit-calendar-picker-indicator{filter:invert(0.85);}
input[type="checkbox"]{accent-color:var(--text-accent);}
body.dark input[type="checkbox"]{accent-color:#5FB8A0;filter:brightness(1.15);}
.theme-toggle{position:fixed;top:10px;left:10px;z-index:20;display:flex;align-items:center;gap:6px;height:26px;padding:0 10px;border-radius:20px;background:var(--surface-2);border:0.5px solid var(--border-strong);cursor:pointer;box-shadow:0 1px 4px rgba(0,0,0,0.12);font-size:12px;color:var(--text-primary)}
.notif-toggle{position:fixed;top:10px;left:112px;z-index:20;width:26px;height:26px;border-radius:50%;background:var(--surface-2);border:0.5px solid var(--border-strong);display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 1px 4px rgba(0,0,0,0.12)}
.header-title{font-size:22px;font-weight:700;color:var(--text-primary);text-align:right}
.header-sub{font-size:13px;color:var(--text-secondary);text-align:right;margin-top:4px;margin-bottom:16px}
.overdue-banner{background:#FCEBEB;border:0.5px solid #E3B3B3;border-radius:10px;padding:12px 14px;margin-bottom:16px;color:#791F1F;font-size:13px;text-align:right}
.dash-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
.backlog-grid,.done-grid{display:grid;gap:10px}
.matrix-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media (max-width:520px){
  .dash-grid{grid-template-columns:repeat(2,1fr)!important}
  .backlog-grid,.done-grid{grid-template-columns:1fr!important}
  .matrix-grid{grid-template-columns:1fr!important}
  body{padding:10px}
}

<div class="wrap" id="root"></div>
<script>
(function(){
  const isDark=localStorage.getItem('kanban_theme')==='dark';
  if(isDark)document.body.classList.add('dark');
  const sun='<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>';
  const moon='<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>';
  const btn=document.getElementById('theme-toggle');
  const setBtn=dark=>{btn.innerHTML=(dark?sun:moon)+`<span>${dark?'فاتح':'داكن'}</span>`;};
  setBtn(document.body.classList.contains('dark'));
  btn.onclick=()=>{
    document.body.classList.toggle('dark');
    const dark=document.body.classList.contains('dark');
    localStorage.setItem('kanban_theme',dark?'dark':'light');
    setBtn(dark);
  };
  const bellOn='<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8a6 6 0 1 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>';
  const bellOff='<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8a6 6 0 1 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/><line x1="3" y1="3" x2="21" y2="21"/></svg>';
  const nbtn=document.getElementById('notif-toggle');
  function setNotifBtn(){
    const on=localStorage.getItem('kanban_reminders')==='on';
    nbtn.style.color=on?'#3B6D11':'var(--text-accent)';
    nbtn.innerHTML=on?bellOn:bellOff;
    nbtn.title=on?'التذكيرات مفعّلة (اضغط للتعطيل)':'تفعيل تذكيرات المتصفح';
  }
  setNotifBtn();
  nbtn.onclick=()=>{
    const on=localStorage.getItem('kanban_reminders')==='on';
    if(on){
      localStorage.setItem('kanban_reminders','off');
    } else {
      localStorage.setItem('kanban_reminders','on');
      if(window.Notification&&Notification.requestPermission){
        Notification.requestPermission();
      }
    }
    setNotifBtn();
    if(window.renderKanban)window.renderKanban();
  };
})();
</script>

root.innerHTML='';

const header=document.createElement('div');
header.innerHTML=`<div class="header-title">مصفوفة الأولويات</div><div class="header-sub">أضف مهمة من الشريط الجانبي، اسحبها إلى الخانة المناسبة، ورتبها كما تريد.</div>`;
root.appendChild(header);

const todayStr=today();
const overdue=tasks.filter(t=>!t.completed&&t.due&&t.due<todayStr);
if(overdue.length&&localStorage.getItem('kanban_reminders')==='on'){
  const banner=document.createElement('div');
  banner.className='overdue-banner';
  banner.innerHTML=`<b>تنبيه:</b> لديك ${tasks.filter(t=>!t.completed).length} مهمة (${overdue.length} متأخرة).<br>
  ${overdue.map(t=>`<span style="display:block;margin-top:4px">• ${t.title} — ${t.due}</span>`).join('')}`;
  root.appendChild(banner);
}

const total=tasks.length;
const doneCount=tasks.filter(t=>t.completed).length;
const pct=total?Math.round(doneCount/total*100):0;
const dash=document.createElement('div');
dash.className='dash-grid';
dash.innerHTML=`
<div style="background:#E6F1FB;border-radius:8px;padding:1rem;box-shadow:0 4px 18px rgba(24,95,165,0.14)"><div style="font-size:13px;font-weight:700;color:#0C447C">إجمالي المهام</div><div style="font-size:24px;font-weight:700;color:#0C447C">${total}</div></div>
<div style="background:#EAF3DE;border-radius:8px;padding:1rem;box-shadow:0 4px 18px rgba(24,95,165,0.14)"><div style="font-size:13px;font-weight:700;color:#173404">نسبة الإنجاز</div><div style="font-size:24px;font-weight:700;color:#173404">${pct}%</div></div>
<div style="background:#EEEDFE;border-radius:8px;padding:1rem;box-shadow:0 4px 18px rgba(24,95,165,0.14)">
<div style="font-size:13px;font-weight:700;color:#26215C;margin-bottom:6px">حسب الأهمية</div>
${Object.entries(quads).map(([k,q])=>{const c=tasks.filter(t=>t.q===k&&!t.completed).length;return `<div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:2px;color:#26215C"><span>${q.title}</span><span style="font-weight:500">${c}</span></div>`;}).join('')}
</div>
<div style="background:#FAECE7;border-radius:8px;padding:1rem;box-shadow:0 4px 18px rgba(24,95,165,0.14)">
<div style="font-size:13px;font-weight:700;color:#4A1B0C;margin-bottom:6px">حسب الحالة</div>
${Object.entries(statusMeta).map(([k,v])=>{const c=tasks.filter(t=>t.status===k).length;return `<div style="display:flex;align-items:center;gap:6px;font-size:11px;margin-bottom:2px;color:#4A1B0C"><span style="width:8px;height:8px;border-radius:50%;background:${v.c};display:inline-block"></span><span style="flex:1">${v.label}</span><span style="font-weight:500">${c}</span></div>`;}).join('')}
</div>`;
root.appendChild(dash);

const createBar=document.createElement('div');
createBar.style.cssText='background:var(--surface-1);border:0.5px solid var(--border);border-radius:12px;padding:10px;margin-bottom:16px;box-shadow:0 4px 18px rgba(24,95,165,0.14)';
createBar.innerHTML=`
<div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
  <input id="new-title" placeholder="عنوان مهمة جديدة" style="flex:1;min-width:140px;font-size:13px"/>
  <span id="add-task" style="font-size:22px;line-height:1;color:#185FA5;cursor:pointer;font-weight:700" title="إضافة">➕</span>
  <span id="ai-toggle" style="font-size:20px;line-height:1;cursor:pointer" title="صياغة أو استخراج بالذكاء الاصطناعي">✨</span>
  <label style="cursor:pointer" title="إرفاق ملف">
    <span style="font-size:20px;line-height:1;color:#0F6E56">📤</span>
    <input id="extract-file" type="file" style="display:none"/>
  </label>
</div>
${attachedFile?`<div style="font-size:11px;color:var(--text-muted);margin-top:6px">📎 ${attachedFile}</div>`:''}`;
root.appendChild(createBar);

const backlogList=tasks.filter(t=>t.q==='backlog'&&!t.completed&&t.status==='notstarted');
const backlogWrap=document.createElement('div');
backlogWrap.style.cssText='background:var(--surface-1);border-radius:12px;padding:10px;margin-bottom:16px;box-shadow:0 4px 18px rgba(24,95,165,0.14)';
backlogWrap.innerHTML='<div style="font-size:13px;font-weight:700;color:var(--text-primary);margin-bottom:8px">قائمة المهام</div>';
const backlogGrid=document.createElement('div');
backlogGrid.className='backlog-grid';
backlogGrid.style.gridTemplateColumns=`repeat(4,1fr)`;
backlogWrap.appendChild(backlogGrid);
backlogList.forEach(t=>backlogGrid.appendChild(cardEl(t)));
addDropHandlers(backlogWrap,'backlog',false);
root.appendChild(backlogWrap);

const matrixWrap=document.createElement('div');
matrixWrap.style.cssText='background:var(--surface-2);border-radius:16px;padding:14px;margin-bottom:16px;box-shadow:0 4px 18px rgba(24,95,165,0.14)';
const matrixLabel=document.createElement('div');
matrixLabel.style.cssText='font-size:13px;font-weight:700;color:var(--text-secondary);margin-bottom:10px';
matrixLabel.innerHTML='▦ مصفوفة الأولويات';
matrixWrap.appendChild(matrixLabel);
const matrixGrid=document.createElement('div');
matrixGrid.className='matrix-grid';
Object.entries(quads).forEach(([key,q])=>{
  const box=document.createElement('div');
  box.dataset.q=key;
  box.style.cssText=`background:${q.bg};border-radius:12px;padding:10px;min-height:60px`;
  const h=document.createElement('div');
  h.style.cssText=`font-size:13px;font-weight:700;color:${q.fg};margin-bottom:8px`;
  h.textContent=q.title;
  box.appendChild(h);
  const list=tasks.filter(t=>t.q===key&&!t.completed&&t.status!=='done').sort((a,b)=>new Date(a.due)-new Date(b.due));
  list.forEach(t=>box.appendChild(cardEl(t)));
  addDropHandlers(box,key,false);
  matrixGrid.appendChild(box);
});
matrixWrap.appendChild(matrixGrid);
root.appendChild(matrixWrap);

const doneWrap=document.createElement('div');
doneWrap.style.cssText='background:var(--surface-1);border-radius:12px;padding:10px;box-shadow:0 4px 18px rgba(24,95,165,0.14)';
doneWrap.innerHTML='<div style="font-size:13px;font-weight:700;color:var(--text-secondary);margin-bottom:8px">المهام المكتملة</div>';
const doneList=tasks.filter(t=>t.completed);
const doneGrid=document.createElement('div');
doneGrid.className='done-grid';
doneGrid.style.gridTemplateColumns=`repeat(4,1fr)`;
doneWrap.appendChild(doneGrid);
doneList.forEach(t=>doneGrid.appendChild(cardEl(t)));
addDropHandlers(doneWrap,null,true);
root.appendChild(doneWrap);

document.getElementById('add-task').onclick=()=>{
  const inp=document.getElementById('new-title');
  if(inp.value.trim()){tasks.push(newTask(inp.value.trim()));inp.value='';persist();render();}
};
document.getElementById('ai-toggle').onclick=()=>{
  const inp=document.getElementById('new-title');
  const val=inp.value.trim();
  if(attachedFile){
    tasks.push(newTask(
      'استخراج وتحليل البيانات من ملف: '+attachedFile,
      'تهدف هذه المهمة إلى مراجعة الملف المرفق بدقة، واستخلاص أهم البنود والمتطلبات الواردة فيه، ثم تصنيفها وتنظيمها في هيكل عملي يسهّل اتخاذ القرار والمتابعة.',
      ['مراجعة الملف وفهرسة محتواه','استخراج البنود والمتطلبات الرئيسية','تصنيف البيانات وتنظيمها','إعداد ملخص وتقرير نهائي']
    ));
    attachedFile=null;
  } else if(val){
    tasks.push(newTask(
      val,
      'تم تحليل عنوان المهمة وصياغته ضمن إطار عمل احترافي يوضّح الهدف والنطاق والمخرج المتوقع، بما يضمن وضوح الأولويات وسهولة تتبّع التنفيذ حتى الإنجاز الكامل.',
      ['تحليل المتطلبات والتخطيط','التنفيذ والتطوير','المراجعة والتحقق من الجودة','التسليم والتوثيق النهائي']
    ));
    inp.value='';
  }
  persist();render();
};
document.getElementById('extract-file').onchange=e=>{
  if(e.target.files[0]){attachedFile=e.target.files[0].name;render();}
};
}
function addDropHandlers(el,qKey,isDone){
el.addEventListener('dragover',e=>{e.preventDefault();el.style.outline='1.5px dashed var(--border-strong)';});
el.addEventListener('dragleave',()=>{el.style.outline='none';});
el.addEventListener('drop',e=>{
  e.preventDefault();el.style.outline='none';
  const t=tasks.find(x=>x.id===dragId);
  if(!t)return;
  if(isDone){
    t.completed=true;t.status='done';
  } else {
    t.q=qKey;t.completed=false;
    if(qKey==='backlog')t.status='notstarted';
    else if(qKey==='q4')t.status='onhold';
    else t.status='doing';
  }
  persist();render();
});
el.addEventListener('touchmove',()=>{},{passive:true});
}
function cardEl(t){
const sm=statusMeta[t.status];
const card=document.createElement('div');
card.draggable=true;
card.style.cssText=`background:var(--surface-2);border:0.5px solid var(--border);border-radius:8px;padding:8px 10px;opacity:${t.completed?0.6:1};position:relative`;
card.addEventListener('dragstart',()=>{dragId=t.id;});
let firstLocked=false;
const stagesHtml=t.stages.map((s,i)=>{
  let locked=false;
  if(!s.done){ if(firstLocked) locked=true; firstLocked=true; }
  return `<div style="display:flex;align-items:center;gap:6px;font-size:12px;margin-bottom:4px;opacity:${locked?0.4:1}">
    <input type="checkbox" ${s.done?'checked':''} ${locked?'disabled':''} data-stage="${i}" class="stage-cb"/>
    <span style="${s.done?'text-decoration:line-through':''}">${s.n}</span>
    ${locked?'<span style="font-size:12px;color:var(--text-muted)">🔒</span>':''}
  </div>`;
}).join('');
const filesHtml=t.files.map(f=>`<div style="font-size:12px;color:var(--text-accent);margin-bottom:4px">📄 ${f}</div>`).join('');
const commentsHtml=t.comments.map(c=>`<div style="font-size:12px;color:var(--text-secondary);margin-bottom:4px">${c}</div>`).join('');
const paletteHtml=t.paletteOpen?`<div class="palette-pop" style="position:absolute;z-index:5;top:26px;left:0;background:var(--surface-1);border:0.5px solid var(--border);border-radius:8px;padding:6px;display:flex;flex-wrap:wrap;gap:6px;width:110px">
  ${palette.map(c=>`<span class="swatch" data-c="${c}" style="width:16px;height:16px;border-radius:50%;background:${c};cursor:pointer"></span>`).join('')}
</div>`:'';
const statusCircles=Object.entries(statusMeta).map(([k,v])=>`<span class="status-dot" data-k="${k}" title="${v.label}" style="width:16px;height:16px;border-radius:50%;background:${v.c};cursor:pointer;display:inline-block;border:${k===t.status?'2px solid var(--text-primary)':'2px solid transparent'}"></span>`).join('');
card.innerHTML=`
<div class="title-box" style="display:flex;align-items:center;gap:6px;margin-bottom:6px;background:${t.color};border-radius:6px;padding:5px 8px;cursor:pointer">
  <input type="checkbox" class="done-cb" ${t.completed?'checked':''} style="accent-color:#fff"/>
  ${paletteHtml}
  <span style="font-size:13px;font-weight:700;flex:1;color:#fff;${t.completed?'text-decoration:line-through':''}">${t.title}</span>
  <span class="chev" style="display:inline-flex;color:#fff;cursor:pointer">${t.open?'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 15l6-6 6 6"/></svg>':'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>'}</span>
  <span class="del" style="font-size:14px;color:#fff;cursor:pointer">🗑</span>
</div>
<div style="display:flex;gap:10px;align-items:center;font-size:11px;color:var(--text-secondary);margin-bottom:6px;flex-wrap:wrap">
  <span>📅 ${fmt(t.created)}</span>
  <span style="display:flex;align-items:center;gap:2px">⏰<input type="date" class="due-input" value="${t.due}" style="border:none;background:transparent;font-size:11px;color:var(--text-secondary);padding:0;height:auto;width:98px"/></span>
</div>
<div style="display:flex;align-items:center;gap:8px;font-size:11px;color:var(--text-muted);margin-bottom:4px;flex-wrap:wrap">
  <span style="background:${sm.c};color:${sm.fg};padding:2px 10px;border-radius:20px;font-size:11px;font-weight:500">${sm.label}</span>
  ${t.desc?'<span style="font-size:13px" title="يحتوي على وصف">📝</span>':''}
  ${t.stages.length?'<span style="display:inline-flex;color:var(--text-muted)" title="مهام فرعية"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3.5 5.5l1.5 1.5l2.5 -2.5"/><path d="M3.5 11.5l1.5 1.5l2.5 -2.5"/><path d="M3.5 17.5l1.5 1.5l2.5 -2.5"/><path d="M11 6l9 0"/><path d="M11 12l9 0"/><path d="M11 18l9 0"/></svg></span>':''}
  ${t.comments.length?`<span style="font-size:13px" title="${t.comments.length} تعليق">💬</span>`:''}
</div>
<div class="details" style="display:${t.open?'block':'none'};border-top:0.5px solid var(--border);margin-top:8px;padding-top:8px">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
    <span style="font-size:12px;font-weight:500">وصف المهمة</span>
    <span class="files-toggle" style="font-size:15px;color:var(--text-muted);cursor:pointer" title="مرفقات (${t.files.length})">📎</span>
  </div>
  <textarea class="desc-box" placeholder="أضف وصفًا للمهمة" style="width:100%;font-size:12px;min-height:40px;margin-bottom:6px">${t.desc}</textarea>
  <div class="files-body" style="display:${t.filesOpen?'block':'none'};margin-bottom:10px">
    ${filesHtml}
    <input class="file-input" type="file" style="font-size:11px"/>
  </div>
  <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
    <span style="font-size:12px;font-weight:500">الحالة</span>
    ${statusCircles}
  </div>
  <div class="stages-header" style="display:flex;align-items:center;gap:6px;cursor:pointer;margin-bottom:${t.stagesOpen?'4px':'0'}">
    <span style="display:inline-flex;color:var(--text-muted)">${t.stagesOpen?'<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 15l6-6 6 6"/></svg>':'<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>'}</span>
    <div class="stages-label" contenteditable="true" style="font-size:12px;font-weight:500;outline:none;border-bottom:1px dashed var(--border)">${t.stagesLabel}</div>
    <span style="font-size:11px;color:var(--text-muted)">(${t.stages.length})</span>
  </div>
  <div class="stages-body" style="display:${t.stagesOpen?'block':'none'};margin-top:6px">
    ${stagesHtml}
    <div style="display:flex;gap:6px;margin-bottom:10px">
      <input class="stage-input" placeholder="مرحلة جديدة" style="flex:1;font-size:12px"/>
      <button class="add-stage" style="font-size:11px;padding:4px 8px">إضافة</button>
    </div>
  </div>
  <div style="display:flex;align-items:center;gap:6px">
    <span class="comment-toggle" style="font-size:16px;color:var(--text-accent);cursor:pointer" title="تعليق">💬</span>
    <span style="font-size:11px;color:var(--text-muted)">(${t.comments.length})</span>
  </div>
  <div class="comment-body" style="display:${t.commentOpen?'block':'none'};margin-top:6px">
    ${commentsHtml}
    <div style="display:flex;gap:6px">
      <input class="comment-input" placeholder="أضف تعليقًا" style="flex:1;font-size:12px"/>
      <button class="add-comment" style="font-size:11px;padding:4px 8px">إضافة</button>
    </div>
  </div>
</div>`;
card.querySelector('.done-cb').onchange=e=>{e.stopPropagation();t.completed=e.target.checked;if(t.completed)t.status='done';persist();render();};
card.querySelector('.title-box').onclick=e=>{
  if(e.target.closest('.chev')||e.target.closest('.del')||e.target.closest('.done-cb')||e.target.closest('.swatch'))return;
  t.paletteOpen=!t.paletteOpen;render();
};
card.querySelectorAll('.swatch').forEach(s=>{
  s.onclick=e=>{e.stopPropagation();t.color=s.dataset.c;t.paletteOpen=false;persist();render();};
});
card.querySelector('.due-input').onclick=e=>{e.stopPropagation();};
card.querySelector('.due-input').onchange=e=>{e.stopPropagation();t.due=e.target.value;persist();render();};
card.querySelector('.chev').onclick=e=>{e.stopPropagation();t.open=!t.open;render();};
card.querySelector('.del').onclick=e=>{e.stopPropagation();tasks=tasks.filter(x=>x.id!==t.id);persist();render();};
if(t.open){
  card.querySelector('.desc-box').onchange=e=>{t.desc=e.target.value;persist();render();};
  card.querySelector('.files-toggle').onclick=()=>{t.filesOpen=!t.filesOpen;render();};
  card.querySelectorAll('.status-dot').forEach(d=>{
    d.onclick=()=>{t.status=d.dataset.k;if(d.dataset.k==='done'){t.completed=true;}persist();render();};
  });
  card.querySelector('.stages-header').onclick=()=>{t.stagesOpen=!t.stagesOpen;render();};
  card.querySelector('.stages-label').onblur=e=>{t.stagesLabel=e.target.textContent.trim()||'المراحل';persist();};
  card.querySelector('.stages-label').onclick=e=>{e.stopPropagation();};
  card.querySelectorAll('.stage-cb').forEach(cb=>{
    cb.onchange=e=>{t.stages[+e.target.dataset.stage].done=e.target.checked;persist();render();};
  });
  card.querySelector('.add-stage').onclick=()=>{
    const inp=card.querySelector('.stage-input');
    if(inp.value.trim()){t.stages.push({n:inp.value.trim(),done:false});t.stagesOpen=true;persist();render();}
  };
  card.querySelector('.file-input').onchange=e=>{
    if(e.target.files[0]){t.files.push(e.target.files[0].name);t.filesOpen=true;persist();render();}
  };
  card.querySelector('.comment-toggle').onclick=()=>{t.commentOpen=!t.commentOpen;render();};
  card.querySelector('.add-comment').onclick=()=>{
    const inp=card.querySelector('.comment-input');
    if(inp.value.trim()){t.comments.push(inp.value.trim());t.commentOpen=true;persist();render();}
  };
}
return card;
}
document.addEventListener('click',e=>{
  if(e.target.closest('.title-box')||e.target.closest('.palette-pop'))return;
  let changed=false;
  tasks.forEach(t=>{if(t.paletteOpen){t.paletteOpen=false;changed=true;}});
  if(changed)render();
});

const notifiedIds=new Set();
function checkReminders(){
  if(localStorage.getItem('kanban_reminders')!=='on')return;
  if(!window.Notification||Notification.permission!=='granted')return;
  const todayStr=today();
  tasks.forEach(t=>{
    if(!t.completed && t.due<=todayStr && !notifiedIds.has(t.id)){
      notifiedIds.add(t.id);
      try{
        new Notification('تذكير بمهمة مستحقة',{body:t.title+' — تاريخ الاستحقاق: '+t.due});
      }catch(e){}
    }
  });
}
checkReminders();
setInterval(checkReminders,60000);
if(localStorage.getItem('kanban_reminders')===null)localStorage.setItem('kanban_reminders','on');
window.renderKanban=render;
loadState();
</script>
</body>
</html>
